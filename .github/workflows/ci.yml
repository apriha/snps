# https://docs.github.com/en/actions
# https://github.com/codecov/example-python
# https://stackoverflow.com/a/3237883
# https://stackoverflow.com/a/5688592
# https://stackoverflow.com/a/6270803
# https://github.com/actions/virtual-environments/issues/1341

name: CI

on:
  schedule:
    - cron: '37 4 * * 0'
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  enable-workflow:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'schedule' && github.repository == 'apriha/snps') }}
    steps:
      - name: Enable workflow based on preconditions
        run: echo "Workflow enabled."

  lint-format:
    needs: [enable-workflow]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Run pre-commit (lint, format, file checks)
      run: |
        pip install pre-commit
        pre-commit run --all-files --show-diff-on-failure

  build-docs:
    needs: [enable-workflow]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0  # fetch tags for setuptools-scm
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install Sphinx
      run: |
        pip install -r docs/requirements.txt
        pip install .
    - name: Build docs with Sphinx
      run: |
        sphinx-build -W --keep-going -T -E -D language=en docs docs/_build

  test:
    needs: [lint-format, build-docs]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        include:
          - os: macos-latest
            python-version: '3.14'
          - os: windows-latest
            python-version: '3.14'

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Ensure Python and source code are on same drive (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      shell: cmd
      run: |
        mkdir C:\a
        xcopy D:\a C:\a /s /e
    - name: Install dependencies
      run: |
        pip install pytest-cov sybil
        pip install .
    - name: Test with pytest (Ubuntu & macOS)
      if: ${{ matrix.os != 'windows-latest' }}
      run: |
        pytest --cov=snps tests README.md
    - name: Test with pytest (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      working-directory: C:\a\snps\snps
      run: |
        pytest --cov=snps tests README.md
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  test-extras:
    needs: [lint-format, build-docs]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install pytest-cov sybil
        pip install .[ezancestry]
    - name: Test with pytest
      run: |
        pytest --cov=snps tests README.md

  # Everyday CI runs fully offline against fixture-backed resources. The live-integration
  # job below is the only one that contacts the real resource servers (Zenodo, S3,
  # Ensembl, NCBI). It runs weekly and on changes to `main`.
  #
  # To exercise every OS x Python combination against the live servers (and the full
  # offline suite) over time without running them all every week, this job picks one
  # combination per ISO week; over a full rotation all combinations are covered.
  live-matrix:
    needs: [test]
    if: ${{ github.repository == 'apriha/snps' && (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')) }}
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.pick.outputs.os }}
      python-version: ${{ steps.pick.outputs.python-version }}
    steps:
    - name: Pick this week's OS / Python combination
      id: pick
      shell: bash
      run: |
        oses=(ubuntu-latest macos-latest windows-latest)
        pys=(3.9 3.10 3.11 3.12 3.13 3.14)
        n=$(( ${#oses[@]} * ${#pys[@]} ))
        idx=$(( 10#$(date -u +%V) % n ))
        os="${oses[$(( idx / ${#pys[@]} ))]}"
        py="${pys[$(( idx % ${#pys[@]} ))]}"
        echo "Selected for this week: $os / Python $py"
        echo "os=$os" >> "$GITHUB_OUTPUT"
        echo "python-version=$py" >> "$GITHUB_OUTPUT"

  # A single-entry matrix from the selector so the chosen combination shows in the
  # job name (e.g. "live-integration (ubuntu-latest, 3.14)").
  live-integration:
    needs: [live-matrix]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["${{ needs.live-matrix.outputs.os }}"]
        python-version: ["${{ needs.live-matrix.outputs.python-version }}"]
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Ensure Python and source code are on same drive (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: cmd
      run: |
        mkdir C:\a
        xcopy D:\a C:\a /s /e
    - name: Install dependencies
      run: |
        pip install pytest-cov sybil
        pip install .
    - name: Test with pytest against the resource servers (Ubuntu & macOS)
      if: ${{ runner.os != 'Windows' }}
      env:
        DOWNLOADS_ENABLED: "true"
      run: |
        pytest --cov=snps tests README.md
    - name: Test with pytest against the resource servers (Windows)
      if: ${{ runner.os == 'Windows' }}
      working-directory: C:\a\snps\snps
      env:
        DOWNLOADS_ENABLED: "true"
      run: |
        pytest --cov=snps tests README.md
