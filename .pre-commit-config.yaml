# https://pre-commit.com
# Install once with: uv run pre-commit install
# Run on demand with: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # never rewrite vendor fixture / golden data files
        exclude: '^tests/(input|resources|output)/'
      - id: end-of-file-fixer
        exclude: '^tests/(input|resources|output)/'
      - id: check-toml
      - id: check-yaml
